steps:
  # ── 1. Build the Docker image ─────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - build
      - '--no-cache'
      - '-t'
      - '$_REGION-docker.pkg.dev/learngcp-487707/$_REPO_NAME/$_SERVICE_NAME:$SHORT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/learngcp-487707/$_REPO_NAME/$_SERVICE_NAME:latest'
      - '.'

  # ── 2. Push image to Artifact Registry ───────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - push
      - '--all-tags'
      - '$_REGION-docker.pkg.dev/learngcp-487707/$_REPO_NAME/$_SERVICE_NAME'

  # ── 3. Deploy to Cloud Run ────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '$_SERVICE_NAME'
      - '--image=$_REGION-docker.pkg.dev/learngcp-487707/$_REPO_NAME/$_SERVICE_NAME:$SHORT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--set-secrets=DATABASE_URL=DATABASE_URL:latest,NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION=NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION:latest'
      - '--set-env-vars=NEXTAUTH_URL=https://$_SERVICE_NAME-$_CLOUD_RUN_SUFFIX,NODE_ENV=production'
      - '--set-env-vars=NEXT_PUBLIC_SITE_URL=https://$_SERVICE_NAME-$_CLOUD_RUN_SUFFIX,NODE_ENV=production'

# Image pushed to Artifact Registry
images:
  - '$_REGION-docker.pkg.dev/learngcp-487707/$_REPO_NAME/$_SERVICE_NAME:$SHORT_SHA'
  - '$_REGION-docker.pkg.dev/learngcp-487707/$_REPO_NAME/$_SERVICE_NAME:latest'

# Substitution variable defaults — override in trigger or gcloud CLI
substitutions:
  _REGION: asia-south1
  _REPO_NAME: doomsaver
  _SERVICE_NAME: doomsaver
  _CLOUD_RUN_SUFFIX: ''

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'    # Faster build for Next.js
  dynamic_substitutions: true